services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: auth_service
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce?schema=auth_service
      JWT_ACCESS_SECRET: access-secret-dev
      JWT_REFRESH_SECRET: refresh-secret-dev
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ENABLED: "false"
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "3001:3001"

  catalog_service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    container_name: catalog_service
    environment:
      PORT: "3002"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce?schema=catalog_service
      JWT_ACCESS_SECRET: access-secret-dev
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "false"
      CORS_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"

  commerce_service:
    build:
      context: .
      dockerfile: commerce_service/Dockerfile
    container_name: commerce_service
    environment:
      PORT: "3003"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce?schema=commerce_service
      JWT_ACCESS_SECRET: access-secret-dev
      CATALOG_SERVICE_URL: http://catalog_service:3002
      CORS_ENABLED: "false"
      VNP_TMN_CODE: "KJPX5OMG"
      VNP_HASH_SECRET: "HRQHV5NUWC27Q3CG5IU554RCJSY9NFDL"
      VNP_URL: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      ROUTE_CHECKOUT: "/checkout"
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      catalog_service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3003:3003"

  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: api_gateway
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce?schema=notification_service
      JWT_ACCESS_SECRET: access-secret-dev
      AUTH_SERVICE_URL: http://auth_service:3001
      CATALOG_SERVICE_URL: http://catalog_service:3002
      COMMERCE_SERVICE_URL: http://commerce_service:3003
      CORS_ENABLED: "false"
      CLOUDINARY_URL: cloudinary://dummy:dummy@dummy
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      auth_service:
        condition: service_started
      catalog_service:
        condition: service_started
      commerce_service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3000:3000"

  smoke_tests:
    image: node:20-alpine
    container_name: smoke_tests
    working_dir: /smoke
    volumes:
      - ./smoke-tests:/smoke
    environment:
      AUTH_BASE_URL: http://auth_service:3001
      CATALOG_BASE_URL: http://catalog_service:3002
      COMMERCE_BASE_URL: http://commerce_service:3003
      GATEWAY_BASE_URL: http://api_gateway:3000
      TEST_EMAIL: customer.one@cnweb.local
      TEST_PASSWORD: "123456"
    depends_on:
      auth_service:
        condition: service_started
      catalog_service:
        condition: service_started
      commerce_service:
        condition: service_started
      api_gateway:
        condition: service_started
    command: ["node", "run.mjs"]
    restart: "no"

volumes:
  postgres_data:
