services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 6000
    restart: always

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    container_name: auth_service
    env_file:
      - auth_service/.env
    environment:
      PORT: "3001"
      CORS_ENABLED: "false"
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "3001:3001"
    restart: always

  catalog_service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    container_name: catalog_service
    env_file:
      - catalog_service/.env
    environment:
      PORT: "3002"
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "false"
      CORS_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    restart: always

  commerce_service:
    build:
      context: .
      dockerfile: commerce_service/Dockerfile
    container_name: commerce_service
    env_file:
      - commerce_service/.env
    environment:
      PORT: "3003"
      CATALOG_SERVICE_URL: http://catalog_service:3002
      CORS_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      ROUTE_CHECKOUT: "/checkout"
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      catalog_service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3003:3003"
    restart: always

  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: api_gateway
    env_file:
      - api_gateway/.env
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth_service:3001
      CATALOG_SERVICE_URL: http://catalog_service:3002
      COMMERCE_SERVICE_URL: http://commerce_service:3003
      CORS_ENABLED: "false"
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      auth_service:
        condition: service_started
      catalog_service:
        condition: service_started
      commerce_service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "3000:3000"
    restart: always

  
volumes:
  postgres_data:
